name: ci

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --run

      - name: Bundle
        run: npm run bundle

  windows-server-2022:
    # Pin the supported server generation. The image build recorded below makes
    # the concrete hosted image part of the proof instead of silently treating
    # a moving `windows-latest` alias as a support contract.
    runs-on: windows-2022
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Record resolved runner image
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          "runner.os=$env:RUNNER_OS"
          "runner.arch=$env:RUNNER_ARCH"
          "image.os=$env:ImageOS"
          "image.version=$env:ImageVersion"

      - name: Download and verify upstream Herdr Windows preview
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $herdrPath = Join-Path $env:RUNNER_TEMP 'herdr-windows-x86_64.exe'
          $herdrUrl = 'https://github.com/ogulcancelik/herdr/releases/download/preview-2026-07-17-813fec141faa/herdr-windows-x86_64.exe'
          Invoke-WebRequest -Uri $herdrUrl -OutFile $herdrPath
          $expectedHash = '2b53a21755d6393515f84c246b6297d46103e7e741714bcf2244b408c1178d57'
          $actualHash = (Get-FileHash -Algorithm SHA256 -Path $herdrPath).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Herdr preview checksum mismatch: expected $expectedHash, got $actualHash"
          }
          "HERDR_SMOKE_HERDR_BINARY=$herdrPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $herdrPath --version

      - name: Compile and test production Windows branches
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo fmt --all --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --target x86_64-pc-windows-msvc --all-targets -- -D warnings
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --target x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo build --release --target x86_64-pc-windows-msvc --bin herdr-go
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Real Herdr runtime and token-isolation smoke
        shell: pwsh
        env:
          HERDR_GO_SMOKE_BINARY: ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\herdr-go.exe
        run: pwsh -NoProfile -File scripts/windows-runtime-smoke.ps1

name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: musl static builds — no glibc dependency, run on any distro.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # Apple Silicon. Intel macs build from source via install.sh's cargo path.
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # The web UI is embedded into the binary at compile time, so bundle it
      # before compiling each release binary.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Bundle web UI
        run: |
          cd web
          npm ci
          npm run bundle

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          name="herdr-go-${{ matrix.target }}"
          mkdir -p "dist/$name"
          bin="target/${{ matrix.target }}/release/herdr-go"
          cp "$bin" "dist/$name/"
          cp config.example.json install.sh README.md "dist/$name/"
          mkdir -p "dist/$name/packaging" "dist/$name/docs/advanced"
          cp packaging/herdr-go.service "dist/$name/packaging/"
          cp docs/installation.md "dist/$name/docs/"
          cp docs/advanced/*.md "dist/$name/docs/advanced/"
          cd dist
          tar czf "$name.tar.gz" "$name"
          echo "ASSET=dist/$name.tar.gz" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true

name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: musl static builds — no glibc dependency, run on any distro.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # Apple Silicon. Intel macs build from source via install.sh's cargo path.
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # The web UI is embedded into the binary at compile time, so bundle it
      # before compiling each release binary.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Bundle web UI
        run: |
          cd web
          npm ci
          npm run bundle

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          name="herdr-go-${{ matrix.target }}"
          mkdir -p "dist/$name"
          bin="target/${{ matrix.target }}/release/herdr-go"
          cp "$bin" "dist/$name/"
          cp config.example.json install.sh README.md "dist/$name/"
          mkdir -p "dist/$name/packaging" "dist/$name/docs/advanced"
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            cp packaging/herdr-go.plist "dist/$name/packaging/"
          else
            cp packaging/herdr-go.service "dist/$name/packaging/"
          fi
          cp docs/installation.md "dist/$name/docs/"
          cp docs/advanced/*.md "dist/$name/docs/advanced/"
          cd dist
          tar czf "$name.tar.gz" "$name"
          echo "ASSET=dist/$name.tar.gz" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  release-windows:
    name: x86_64-pc-windows-msvc
    # Pin the supported server generation, matching ci.yml's windows-server-2022
    # job. This job is fully self-contained and does not touch `build` above.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # The web UI is embedded into the binary at compile time, so bundle it
      # before compiling the release binary.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Bundle web UI
        shell: bash
        run: |
          cd web
          npm ci
          npm run bundle

      - name: Build binary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo build --release --target x86_64-pc-windows-msvc --bin herdr-go
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Withheld until Windows runtime evidence passes (decision edbb7a4e): this
      # step mirrors ci.yml's windows-server-2022 job verbatim so the release
      # binary is proven against real Herdr before any artifact is packaged.
      - name: Download and verify upstream Herdr Windows preview
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $herdrPath = Join-Path $env:RUNNER_TEMP 'herdr-windows-x86_64.exe'
          $herdrUrl = 'https://github.com/ogulcancelik/herdr/releases/download/preview-2026-07-17-813fec141faa/herdr-windows-x86_64.exe'
          Invoke-WebRequest -Uri $herdrUrl -OutFile $herdrPath
          $expectedHash = '2b53a21755d6393515f84c246b6297d46103e7e741714bcf2244b408c1178d57'
          $actualHash = (Get-FileHash -Algorithm SHA256 -Path $herdrPath).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Herdr preview checksum mismatch: expected $expectedHash, got $actualHash"
          }
          "HERDR_SMOKE_HERDR_BINARY=$herdrPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $herdrPath --version

      - name: Real Herdr runtime and token-isolation smoke
        shell: pwsh
        env:
          HERDR_GO_SMOKE_BINARY: ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\herdr-go.exe
        run: pwsh -NoProfile -File scripts/windows-runtime-smoke.ps1

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $name = 'herdr-go-x86_64-pc-windows-msvc'
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item 'target/x86_64-pc-windows-msvc/release/herdr-go.exe' "dist/$name/"
          Copy-Item 'config.example.json', 'README.md' "dist/$name/"
          New-Item -ItemType Directory -Force -Path "dist/$name/docs/advanced" | Out-Null
          Copy-Item 'docs/installation.md' "dist/$name/docs/"
          Copy-Item 'docs/advanced/*.md' "dist/$name/docs/advanced/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          "ASSET=dist/$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Post-publish (decision D1 of windows-installer-runtime-smoke): proves
      # install.ps1's real end-user flow against the asset just published
      # above. A failure fails this job but the asset stays published --
      # gating pre-publish would need draft releases plus a test-only auth
      # tweak that deviates from testing the literal end-user path.
      - name: Real install.ps1 -> Scheduled Task -> crash-restart -> uninstall smoke
        shell: pwsh
        env:
          HERDR_GO_VERSION: ${{ github.ref_name }}
        run: pwsh -NoProfile -File scripts/windows-install-smoke.ps1

  macos-install-smoke:
    name: macOS install.sh runtime smoke
    needs: build
    if: ${{ !cancelled() }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Post-publish (decision D2 of macos-installer-runtime-smoke): proves
      # install.sh's real end-user flow -> LaunchAgent -> crash-restart ->
      # uninstall against the macOS release asset the build matrix just
      # published above. A failure fails this job but the asset stays
      # published -- same posture as release-windows's equivalent smoke step.
      - name: Real install.sh -> LaunchAgent -> crash-restart -> uninstall smoke
        env:
          HERDR_GO_VERSION: ${{ github.ref_name }}
        run: bash scripts/macos-install-smoke.sh
